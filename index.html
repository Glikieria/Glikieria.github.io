<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Glikieria的博客</title>
    <!-- marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- highlight.js 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            background: #f5f7fa;
            color: #1e2a3a;
        }

        /* 整体容器，左右两栏 */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧目录栏 */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            box-shadow: 2px 0 8px rgba(0,0,0,0.02);
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        /* 右侧主内容区 */
        .main {
            flex: 1;
            padding: 2rem;
            max-width: calc(100% - 280px);
        }

        /* 博客标题 */
        .blog-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #e2e8f0;
            color: #0f172a;
        }

        /* 文章列表 */
        .post-list {
            list-style: none;
        }
        .post-item {
            margin-bottom: 1.5rem;
        }
        .post-link {
            display: block;
            text-decoration: none;
            color: #334155;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .post-link:hover {
            background: #f1f5f9;
            color: #3b82f6;
            transform: translateX(4px);
        }
        .post-date {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.25rem;
            padding-left: 0.75rem;
        }

        /* 右侧内容卡片 */
        .content-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 2rem;
            transition: all 0.3s ease;
        }

        /* 欢迎区域 */
        .welcome {
            text-align: center;
            padding: 3rem 1rem;
        }
        .welcome h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #0f172a;
        }
        .welcome p {
            color: #475569;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 文章内容样式 */
        .post-body {
            font-size: 1rem;
            line-height: 1.7;
        }
        .post-body h1, .post-body h2, .post-body h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
        }
        .post-body p {
            margin-bottom: 1.2em;
        }
        .post-body code {
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.9em;
            background: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            color: #d14;
        }
        .post-body pre {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            border: 1px solid #e2e8f0;
        }
        .post-body pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .post-body blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #475569;
        }
        .post-body img {
            max-width: 100%;
            border-radius: 12px;
        }

        /* 响应式：移动端转为上下布局 */
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                padding: 1.5rem;
            }
            .main {
                max-width: 100%;
                padding: 1rem;
            }
            .blog-title {
                margin-bottom: 1rem;
            }
            .post-list {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem;
            }
            .post-item {
                width: auto;
                margin-bottom: 0;
            }
            .post-link {
                background: #f1f5f9;
                padding: 0.5rem 1rem;
                border-radius: 40px;
            }
            .post-link:hover {
                transform: none;
            }
            .post-date {
                display: none; /* 移动端隐藏日期，节省空间 */
            }
        }

        /* 滚动条美化（可选） */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 左侧目录栏 -->
    <aside class="sidebar">
        <div class="blog-title">📝 我的笔记</div>
        <ul class="post-list" id="post-list">
            <li>加载中...</li>
        </ul>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main">
        <div class="content-card" id="content-area">
            <div class="welcome">
                <h2>✨ 欢迎来到我的笔记博客</h2>
                <p>这里记录了我的学习笔记与思考。</p>
                <p style="margin-top: 1rem;">📌 点击左侧文章开始阅读～</p>
            </div>
        </div>
    </main>
</div>

<script>
    // ===================== 配置区 =====================
    // 请根据你的实际文件名修改这里
    const posts = [
        { filename: "test.md", title: "测试文章", date: "2025-03-22" },
        { filename: "WMI自启动.md", title: "WMI自启动", date: "2025-03-23" },
        { filename: "常规注册表自启动.md", title: "常规注册表自启动", date: "2025-03-24" },
        { filename: "计划任务自启动.md", title: "计划任务自启动", date: "2025-03-24" },
        { filename: "隐蔽的自启动项.md", title: "隐蔽的自启动项", date: "2025-03-24" },
        { filename: "自启动文件夹.md", title: "自启动文件夹", date: "2025-03-24" }
    ];
    // =================================================

    const postListEl = document.getElementById('post-list');
    const contentArea = document.getElementById('content-area');

    // 渲染左侧文章列表
    function renderSidebar() {
        if (!posts.length) {
            postListEl.innerHTML = '<li>暂无文章</li>';
            return;
        }
        let html = '';
        posts.forEach(post => {
            html += `
                <li class="post-item">
                    <a href="#" class="post-link" data-filename="${escapeHtml(post.filename)}">
                        ${escapeHtml(post.title)}
                    </a>
                    <div class="post-date">📅 ${escapeHtml(post.date)}</div>
                </li>
            `;
        });
        postListEl.innerHTML = html;

        // 绑定点击事件
        postListEl.addEventListener('click', (e) => {
            const link = e.target.closest('.post-link');
            if (link && link.dataset.filename) {
                e.preventDefault();
                loadAndDisplayPost(link.dataset.filename);
            }
        });
    }

    // 加载并显示文章内容
    function loadAndDisplayPost(filename) {
        fetch(filename)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: 文件不存在`);
                }
                return response.text();
            })
            .then(markdown => {
                const html = marked.parse(markdown);
                contentArea.innerHTML = `
                    <div class="post-body">
                        ${html}
                    </div>
                `;
                // 触发代码高亮
                hljs.highlightAll();
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(err => {
                contentArea.innerHTML = `
                    <div class="welcome" style="color: #dc2626;">
                        <h2>⚠️ 加载失败</h2>
                        <p>${err.message}</p>
                        <p style="margin-top: 1rem;">请确认文件 “${escapeHtml(filename)}” 位于仓库根目录。</p>
                    </div>
                `;
            });
    }

    // 辅助函数：防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化
    renderSidebar();
</script>
</body>
</html>
